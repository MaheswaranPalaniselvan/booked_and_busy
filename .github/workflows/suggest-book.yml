name: Suggest book from issue

on:
  issues:
    types: [opened, labeled]

# Only run for issues created via the "Suggest a book" form (label: suggest-book).
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  suggest-book:
    if: contains(github.event.issue.labels.*.name, 'suggest-book')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/suggest-book.yml

      - name: Append suggestion to suggestions.csv
        id: append
        env:
          ISSUE_JSON: ${{ steps.parse.outputs.jsonString }}
          CSV_FILE: suggestions.csv
          COLUMNS: title,author,reason,wiki
          REQUIRED: title,reason
        run: node .github/scripts/append-book.js

      - name: Create Pull Request
        if: steps.append.outputs.ok == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: suggest-book/issue-${{ github.event.issue.number }}
          commit-message: "Suggest book: ${{ steps.append.outputs.title }} (#${{ github.event.issue.number }})"
          title: "Suggest book: ${{ steps.append.outputs.title }}"
          body: |
            Suggests **${{ steps.append.outputs.title }}** by ${{ steps.append.outputs.author }} for the community reading list.

            Recommended by @${{ github.event.issue.user.login }} in #${{ github.event.issue.number }}.

            Closes #${{ github.event.issue.number }}
          labels: suggest-book

      - name: Comment on invalid submission
        if: steps.append.outputs.ok != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = process.env.REASON || 'Title, Author and a reason are required.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ This suggestion could not be added automatically: ${reason}\n\nPlease edit the issue with the missing details, then re-apply the **suggest-book** label to try again.`,
            });
        env:
          REASON: ${{ steps.append.outputs.reason }}
